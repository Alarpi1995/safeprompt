<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SafePrompt</title>
  <style>
    :root {
      --bg: #ffffff;
      --bg2: #f8f9fa;
      --text: #1a1a2e;
      --text2: #6b7280;
      --border: #e5e7eb;
      --primary: #6366f1;
      --primary-hover: #4f46e5;
      --safe: #22c55e;
      --danger: #ef4444;
      --warning: #eab308;
      --radius: 10px;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #1e1e2e;
        --bg2: #2a2a3e;
        --text: #e4e4e7;
        --text2: #a1a1aa;
        --border: #3f3f5c;
      }
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 340px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      font-size: 14px;
    }

    /* Header */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px;
      border-bottom: 1px solid var(--border);
    }

    .header__brand {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .header__logo {
      width: 28px;
      height: 28px;
    }

    .header__name {
      font-size: 16px;
      font-weight: 700;
    }

    .header__version {
      font-size: 11px;
      color: var(--text2);
      margin-left: 4px;
    }

    /* Toggle */
    .toggle {
      position: relative;
      width: 44px;
      height: 24px;
    }

    .toggle input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .toggle__slider {
      position: absolute;
      cursor: pointer;
      inset: 0;
      background: #ccc;
      border-radius: 24px;
      transition: 0.3s;
    }

    .toggle__slider::before {
      content: '';
      position: absolute;
      height: 18px;
      width: 18px;
      left: 3px;
      bottom: 3px;
      background: white;
      border-radius: 50%;
      transition: 0.3s;
    }

    .toggle input:checked + .toggle__slider {
      background: var(--safe);
    }

    .toggle input:checked + .toggle__slider::before {
      transform: translateX(20px);
    }

    /* Status */
    .status {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 12px 16px;
      background: var(--bg2);
      font-size: 13px;
    }

    .status__dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .status__dot--active { background: var(--safe); }
    .status__dot--paused { background: var(--warning); }

    /* Stats */
    .stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      padding: 16px;
    }

    .stat {
      background: var(--bg2);
      border-radius: var(--radius);
      padding: 12px;
      text-align: center;
    }

    .stat__value {
      font-size: 24px;
      font-weight: 700;
      color: var(--primary);
    }

    .stat__label {
      font-size: 11px;
      color: var(--text2);
      margin-top: 4px;
    }

    /* Quick scan */
    .scan-section {
      padding: 0 16px 16px;
    }

    .scan-section textarea {
      width: 100%;
      height: 70px;
      padding: 10px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--bg2);
      color: var(--text);
      font-family: inherit;
      font-size: 13px;
      resize: none;
    }

    .scan-section textarea:focus {
      outline: none;
      border-color: var(--primary);
    }

    .scan-btn {
      width: 100%;
      margin-top: 8px;
      padding: 10px;
      background: var(--primary);
      color: white;
      border: none;
      border-radius: var(--radius);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }

    .scan-btn:hover { background: var(--primary-hover); }

    /* Scan results */
    .results {
      padding: 0 16px 16px;
      display: none;
    }

    .results--visible { display: block; }

    .results__title {
      font-size: 12px;
      font-weight: 600;
      color: var(--text2);
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .results__item {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 8px;
      background: var(--bg2);
      border-radius: 6px;
      font-size: 12px;
      margin-bottom: 4px;
    }

    .results__empty {
      text-align: center;
      color: var(--safe);
      font-weight: 600;
      padding: 8px;
    }

    /* Footer */
    .footer {
      display: flex;
      gap: 8px;
      padding: 12px 16px;
      border-top: 1px solid var(--border);
    }

    .footer-btn {
      flex: 1;
      padding: 8px;
      background: var(--bg2);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      text-align: center;
      transition: background 0.2s;
    }

    .footer-btn:hover { background: var(--border); }
  </style>
</head>
<body>
  <!-- Header -->
  <div class="header">
    <div class="header__brand">
      <img class="header__logo" src="../icons/icon48.png" alt="SafePrompt">
      <span class="header__name">SafePrompt <span class="header__version">v1.0</span></span>
    </div>
    <label class="toggle">
      <input type="checkbox" id="toggleActive" checked>
      <span class="toggle__slider"></span>
    </label>
  </div>

  <!-- Status -->
  <div class="status" id="statusBar">
    <span class="status__dot status__dot--active" id="statusDot"></span>
    <span id="statusText">Protection active</span>
  </div>

  <!-- Stats -->
  <div class="stats">
    <div class="stat">
      <div class="stat__value" id="totalBlocked">0</div>
      <div class="stat__label">Total Blocked</div>
    </div>
    <div class="stat">
      <div class="stat__value" id="thisMonth">0</div>
      <div class="stat__label">This Month</div>
    </div>
  </div>

  <!-- Quick Scan -->
  <div class="scan-section">
    <textarea id="scanInput" placeholder="Paste text here or drop a .txt/.csv file to scan..."></textarea>
    <button class="scan-btn" id="scanBtn">Scan for PII</button>
    <div class="drop-hint" id="dropHint" style="display:none;text-align:center;padding:6px;color:var(--primary);font-size:11px;font-weight:600;">Drop file to scan</div>
  </div>

  <!-- Results -->
  <div class="results" id="results">
    <div class="results__title">Detections</div>
    <div id="resultsList"></div>
  </div>

  <!-- Footer -->
  <div class="footer">
    <button class="footer-btn" id="settingsBtn">Settings</button>
    <button class="footer-btn" id="activityBtn">Activity Log</button>
  </div>

  <script src="../core/detector.js"></script>
  <script src="../languages/en.js"></script>
  <script src="../languages/ar.js"></script>
  <script src="../languages/es.js"></script>
  <script src="../languages/fr.js"></script>
  <script src="../languages/zh.js"></script>
  <script src="../languages/de.js"></script>
  <script src="../languages/pt.js"></script>
  <script src="../core/context-patterns.js"></script>
  <script src="popup.js"></script>
</body>
</html>
